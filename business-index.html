<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@IM — 비즈니스 홈페이지</title>
<meta name="description" content="@IM이 제작한 비즈니스 웹사이트 모음.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f7fb; --panel:#ffffff; --ink:#192231; --muted:#5d6878; --line:#e3e9f1;
  --blue:#2f5fa8; --blue2:#27508f; --accent:#2f5fa8; --gold:#b9954c;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;overflow-x:hidden;
  background-image:radial-gradient(760px 460px at 86% -6%,rgba(47,95,168,.12),transparent 60%),
                   radial-gradient(640px 460px at 4% 16%,rgba(47,95,168,.07),transparent 56%)}
h1,h2,h3,.serif{font-family:'Fraunces',serif}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
.wrap{max-width:1180px;margin:0 auto;padding:0 26px}

header{position:sticky;top:0;z-index:50;background:rgba(244,247,251,.8);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
nav{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 26px;max-width:1180px;margin:0 auto}
.brand{display:flex;align-items:center;gap:11px}
.brand .mk{width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,var(--blue),var(--blue2));
  display:grid;place-items:center;box-shadow:0 10px 22px -10px rgba(47,95,168,.6)}
.brand .mk b{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;color:#fff;letter-spacing:.4px}
.brand .nm b{font-family:'Fraunces',serif;font-weight:600;font-size:1.1rem}
.brand .nm span{display:block;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:12px}
.home-link{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:.85rem;color:var(--muted);
  border:1px solid var(--line);background:var(--panel);padding:8px 15px;border-radius:30px;transition:.2s}
.home-link:hover{color:var(--blue);border-color:var(--blue)}
.lang{display:inline-flex;border:1px solid var(--line);border-radius:30px;padding:3px;background:var(--panel)}
.lang button{border:none;background:transparent;color:var(--muted);font-family:'Hanken Grotesk',sans-serif;font-weight:700;
  font-size:.78rem;padding:7px 12px;border-radius:24px;cursor:pointer;transition:.2s}
.lang button.on{background:var(--blue);color:#fff}

.hero{padding:78px 0 50px;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:.72rem;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--blue);background:var(--panel);border:1px solid var(--line);padding:8px 16px;border-radius:30px}
.hero h1{font-size:clamp(2.4rem,5.4vw,4rem);line-height:1.05;font-weight:600;letter-spacing:-1.2px;margin:22px 0 16px}
.hero h1 em{font-style:italic;color:var(--blue)}
.hero p{font-size:1.06rem;color:var(--muted);max-width:540px;margin:0 auto}

.sec{padding:30px 0 40px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
.proj{opacity:0;transform:translateY(24px);transition:.7s cubic-bezier(.2,.7,.2,1)}
.proj.in{opacity:1;transform:none}
.win{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;height:100%;
  box-shadow:0 24px 50px -34px rgba(25,34,49,.3);transition:.35s}
.proj:hover .win{transform:translateY(-8px);border-color:rgba(47,95,168,.35);box-shadow:0 40px 70px -36px rgba(25,34,49,.4)}
.bar{display:flex;align-items:center;gap:12px;padding:12px 15px;background:#f7f9fc;border-bottom:1px solid var(--line)}
.dots{display:flex;gap:6px}.dots i{width:10px;height:10px;border-radius:50%;display:block}
.dots i:nth-child(1){background:#e08b82}.dots i:nth-child(2){background:#e6c266}.dots i:nth-child(3){background:#6cc189}
.url{flex:1;background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 12px;font-size:.76rem;color:var(--muted);
  white-space:nowrap;overflow:hidden}
.url b{color:var(--ink);font-weight:600}
.shot{position:relative;aspect-ratio:16/10;background:linear-gradient(135deg,#dfe8f5,#eef2f8);overflow:hidden}
.shot img{width:100%;height:100%;object-fit:cover}
.shot .ph{position:absolute;inset:0;display:grid;place-items:center;color:#aeb9cc}
.shot .ph svg{width:50px;height:50px}
.meta{padding:20px}
.meta h3{font-size:1.3rem;font-weight:600}
.meta .loc{font-size:.85rem;color:var(--muted);margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.tag{font-size:.72rem;font-weight:600;color:var(--muted);border:1px solid var(--line);padding:4px 11px;border-radius:20px}

.ghost .win{background:transparent;border:1.5px dashed #cdd7e6;box-shadow:none;display:flex;align-items:center;justify-content:center;min-height:300px}
.proj.ghost:hover .win{transform:translateY(-6px);border-color:var(--blue)}
.gin{text-align:center;padding:40px 26px}
.gin .plus{width:56px;height:56px;margin:0 auto 16px;border-radius:50%;border:1.5px dashed #b9c6da;display:grid;place-items:center;color:var(--blue);font-size:1.6rem;font-family:'Fraunces',serif}
.gin h3{font-size:1.12rem;font-weight:600;margin-bottom:6px}
.gin p{color:var(--muted);font-size:.86rem}

.cta{margin:60px 0 80px}
.cta-box{border:1px solid var(--line);border-radius:26px;padding:64px 40px;text-align:center;
  background:linear-gradient(140deg,rgba(47,95,168,.08),rgba(47,95,168,.02))}
.cta-box h2{font-size:clamp(1.8rem,3.6vw,2.6rem);font-weight:600;letter-spacing:-.8px;margin-bottom:12px}
.cta-box h2 em{font-style:italic;color:var(--blue)}
.cta-box p{color:var(--muted);max-width:460px;margin:0 auto 26px}
.cta-box .btn{display:inline-flex;align-items:center;gap:9px;background:var(--blue);color:#fff;font-weight:700;
  padding:14px 30px;border-radius:40px;transition:.25s;box-shadow:0 16px 32px -14px rgba(47,95,168,.6)}
.cta-box .btn:hover{background:var(--blue2);transform:translateY(-2px)}

footer{border-top:1px solid var(--line);padding:34px 0}
.frow{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:.84rem}

@media(max-width:900px){ .grid{grid-template-columns:1fr 1fr} }
@media(max-width:620px){ .grid{grid-template-columns:1fr} .home-link span{display:none} }
</style>
</head>
<body>

<header>
  <nav>
    <a class="brand" href="../">
      <span class="mk"><b>IM</b></span>
      <span class="nm"><b>@IM</b><span>IT · Texas, USA</span></span>
    </a>
    <div class="nav-right">
      <a class="home-link" href="../">&larr; <span data-i18n="home">홈</span></a>
      <div class="lang" id="lang">
        <button data-lang="ko" class="on">한국어</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </nav>
</header>

<main>
  <section class="hero wrap">
    <span class="eyebrow">&#10022; <span data-i18n="eyebrow">@IM Business</span></span>
    <h1 data-i18n="h1">비즈니스 <em>홈페이지</em></h1>
    <p data-i18n="sub">기업 · 브랜드 · 스토어를 위한 웹사이트. @IM이 만든 비즈니스 작업물을 이곳에 모읍니다.</p>
  </section>

  <section class="sec wrap">
    <div class="grid" id="grid"></div>
  </section>

  <section class="cta wrap">
    <div class="cta-box">
      <h2 data-i18n="ctaTitle">웹사이트가 <em>필요하신가요?</em></h2>
      <p data-i18n="ctaSub">기업·브랜드·스토어 홈페이지, @IM이 함께 만들어 드립니다.</p>
      <a class="btn" href="mailto:?subject=@IM 비즈니스 홈페이지 문의"><span data-i18n="ctaBtn">문의하기</span> &#8599;</a>
    </div>
  </section>

  <footer class="wrap">
    <div class="frow">
      <span>@IM</span>
      <span data-i18n="copyright">© 2025 @IM · Web &amp; Software · Texas, USA</span>
    </div>
  </footer>
</main>

<script>
/* ====================================================
   비즈니스 홈페이지 추가: 아래 PROJECTS 에 항목 추가.
   비어 있으면 "준비 중" 카드 3개가 자동으로 표시됩니다.
   ==================================================== */
const PROJECTS = [
  // {
  //   name: "회사 이름",
  //   loc:  "City, State",
  //   url:  "https://...",
  //   path: "도메인/경로",
  //   tags:   ["기업 사이트", "반응형", "2025"],
  //   tagsEn: ["Company site", "Responsive", "2025"],
  //   cover: ""   // 이미지 URL 또는 비워두기
  // },
];

const T = {
  ko:{ title:"@IM — 비즈니스 홈페이지", home:"홈", eyebrow:"@IM Business",
       h1:"비즈니스 <em>홈페이지</em>",
       sub:"기업 · 브랜드 · 스토어를 위한 웹사이트. @IM이 만든 비즈니스 작업물을 이곳에 모읍니다.",
       visit:"사이트 보기", ghostT:"준비 중", ghostP:"곧 새로운 작업물이 올라옵니다.",
       ctaTitle:"웹사이트가 <em>필요하신가요?</em>", ctaSub:"기업·브랜드·스토어 홈페이지, @IM이 함께 만들어 드립니다.",
       ctaBtn:"문의하기", copyright:"© 2025 @IM · Web &amp; Software · Texas, USA" },
  en:{ title:"@IM — Business Websites", home:"Home", eyebrow:"@IM Business",
       h1:"Business <em>websites</em>",
       sub:"Sites for companies, brands & stores. @IM's business work lives here.",
       visit:"Visit site", ghostT:"Coming soon", ghostP:"New work will appear here shortly.",
       ctaTitle:"Need a <em>website?</em>", ctaSub:"Company, brand & store sites — built with @IM.",
       ctaBtn:"Get in touch", copyright:"© 2025 @IM · Web & Software · Texas, USA" }
};

const grid=document.getElementById('grid');
let firstPaint=true;
function renderGrid(lang){
  grid.innerHTML=''; const t=T[lang];
  PROJECTS.forEach(p=>{
    const shot=p.cover?`<img src="${p.cover}" alt="${p.name}">`:`<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 8h18M8 21h8M12 18v3"/></svg></div>`;
    const tg=(lang==='en'?(p.tagsEn||p.tags):p.tags)||[];
    const tags=tg.map(x=>`<span class="tag">${x}</span>`).join('');
    const el=document.createElement('a'); el.className='proj'; el.href=p.url; el.target='_blank'; el.rel='noopener';
    el.innerHTML=`<div class="win"><div class="bar"><span class="dots"><i></i><i></i><i></i></span><span class="url"><b>${p.path}</b></span></div><div class="shot">${shot}</div><div class="meta"><h3>${p.name}</h3><div class="loc">${p.loc}</div><div class="tags">${tags}</div></div></div>`;
    grid.appendChild(el);
  });
  // empty state -> 3 ghost cards
  const ghostN = PROJECTS.length ? 1 : 3;
  for(let i=0;i<ghostN;i++){
    const g=document.createElement('div'); g.className='proj ghost';
    g.innerHTML=`<div class="win"><div class="gin"><div class="plus">+</div><h3>${t.ghostT}</h3><p>${t.ghostP}</p></div></div>`;
    grid.appendChild(g);
  }
  const cards=grid.querySelectorAll('.proj');
  if(firstPaint){ const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1}); cards.forEach(c=>io.observe(c)); firstPaint=false; }
  else cards.forEach(c=>c.classList.add('in'));
}
function setLang(l){ const t=T[l]; document.documentElement.lang=l; document.title=t.title;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const k=e.getAttribute('data-i18n'); if(t[k]!==undefined) e.innerHTML=t[k];});
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  renderGrid(l);
}
document.querySelectorAll('#lang button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
setLang('ko');
</script>
</body>
</html>
